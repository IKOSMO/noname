name: noname_workspace
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  auto_route: ^11.1.0
  auto_route_generator: ^10.5.0
  flutter_riverpod: ^3.3.1
  drift: ^2.34.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path: ^1.9.1
  path_provider: ^2.1.6
  melos: ^7.8.1



dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  build_runner: ^2.15.0
  json_serializable: ^6.14.0
  drift_dev: ^2.34.0

analyzer:
  errors:
    invalid_annotation_target: ignore

flutter:
  generate: true
  uses-material-design: true

  assets:
  
  fonts:
    - family: Title
      fonts:
        - asset: assets/fonts/title.ttf
    - family: Monoton
      fonts:
        - asset: assets/fonts/Monoton-Regular.ttf